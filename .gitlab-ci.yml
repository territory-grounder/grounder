# Territory Grounder CI — the P0-8 security gates run on every merge request.
# [O] INV-02/INV-03/INV-13/INV-17, P0-8, P3-2.
stages: [verify, docker, deploy, sync]

variables:
  GOTOOLCHAIN: auto
  # The images this pipeline builds and pushes to the GitLab Container Registry (the "docker registry of the
  # GitLab server"). A deploy pulls these by tag — the production host never builds from source (GitOps).
  TG_GROUNDER_IMAGE: "$CI_REGISTRY_IMAGE/grounder"
  TG_WORKER_IMAGE: "$CI_REGISTRY_IMAGE/worker"
  TG_CONSOLE_IMAGE: "$CI_REGISTRY_IMAGE/console"

default:
  image: golang:1.25.12

.rules-mr: &rules-mr
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "main"'

build-test:
  stage: verify
  <<: *rules-mr
  script:
    - go build ./...
    - go vet ./...
    - go test ./... -race -count=1

forbidden-patterns:
  stage: verify
  <<: *rules-mr
  script:
    - bash scripts/lint-forbidden.sh

# The spec lattice is a release gate: EARS shape, REQ uniqueness, weasel-word ban, tasks DAG
# acyclicity, requirement<->task<->scenario traceability, and spec<->code lockstep drift.
# [F] spec/007 · [O] INV-22.
spec-lattice:
  stage: verify
  <<: *rules-mr
  script:
    - go run ./tools/specvalidate
    - go run ./tools/specvalidate lockstep --check

gitleaks:
  stage: verify
  <<: *rules-mr
  image:
    name: zricethezav/gitleaks:latest
    # The image's ENTRYPOINT is the gitleaks binary; clear it so the runner can run its shell
    # prologue (otherwise the script is passed as `gitleaks sh -c ...` -> "unknown command sh").
    entrypoint: [""]
  script:
    - gitleaks detect --source . --config .gitleaks.toml --redact --verbose --no-banner --exit-code 1

# Supply-chain SCA (TG-158): fail on any Go vulnerability REACHABLE from our code. govulncheck is
# call-graph precise — it flags only advisories actually called, not merely present, so the gate does not
# false-alarm on unused transitive deps. Stdlib CVEs are cleared by the pinned go1.25.12 toolchain; a new
# advisory forces a toolchain or dependency bump (the intended hygiene loop). [F] OWASP LLM03 / NIST SSDF.
govulncheck:
  stage: verify
  <<: *rules-mr
  script:
    - go install golang.org/x/vuln/cmd/govulncheck@latest
    - govulncheck ./...

# Supply-chain (TG-159): third-party base/runtime images must be @sha256-pinned so a floating tag can never
# swap the trusted computing base underneath the signed governance system. A trivial shell check — no Docker.
image-pins:
  stage: verify
  <<: *rules-mr
  script:
    - bash scripts/lint-image-pins.sh

# Supply-chain (TG-158): CVE-scan the litellm image we actually deploy. Digest-pinning FROZE it, and govulncheck
# is Go-only, so litellm (Python + OS packages) would otherwise carry undetected CVEs — it holds every provider
# API key. Scan the EXACT pinned digest from compose (stays in sync). Gate on FIXABLE criticals only
# (--ignore-unfixed): a fixable CRITICAL means "re-pin litellm to a patched digest" — the intended hygiene loop;
# an unfixable one is not actionable and must not wedge the pipeline. trivy pulls via the registry (no dind).
trivy-image-scan:
  stage: verify
  <<: *rules-mr
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  script:
    - REF=$(grep -oE 'ghcr\.io/berriai/litellm[^ ]*@sha256:[a-f0-9]+' deploy/docker-compose.yml | head -1)
    - test -n "$REF"  # the image-pins gate guarantees litellm is pinned; fail loudly if the grep drifts
    - trivy image --scanners vuln --ignore-unfixed --severity CRITICAL --exit-code 1 --no-progress "$REF"

# Supply-chain (TG-158): emit a CycloneDX + SPDX SBOM of the source + Go dependency tree as a retained artifact
# — the provenance record for what ships (the input a later cosign attestation signs). Non-gating: an SBOM
# describes, it does not judge; the govulncheck/trivy gates do the judging.
sbom:
  stage: verify
  <<: *rules-mr
  # The anchore/syft image is shell-less (distroless), so GitLab's script prologue fails with
  # `exec: "sh": not found` even with entrypoint cleared. Run syft from a shell-having base and install a
  # PINNED syft binary via the official installer. An SBOM is a DESCRIPTIVE provenance artifact — it judges
  # nothing (the govulncheck/trivy gates do), so it must never gate a merge or red main: allow_failure. The
  # installer pulls the binary from github, which the runner reaches unreliably (observed HTTP 000 timeouts),
  # so retry with backoff; a persistent egress outage then soft-fails instead of blocking delivery.
  image: alpine:3.20
  allow_failure: true
  script:
    - apk add --no-cache curl ca-certificates
    - |
      for i in 1 2 3 4 5; do
        curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin v1.49.0 && break
        echo "syft install attempt $i failed (github egress); retrying in $((i*10))s"; sleep $((i*10))
      done
    - command -v syft >/dev/null 2>&1 || { echo "syft unavailable after retries (github egress) — skipping SBOM"; exit 1; }
    - syft dir:. --source-name territory-grounder -o cyclonedx-json=sbom.cyclonedx.json -o spdx-json=sbom.spdx.json
  artifacts:
    paths: [sbom.cyclonedx.json, sbom.spdx.json]
    expire_in: 90 days

# A route with no auth method panics at boot (INV-01); the preflight must pass read-only.
preflight-smoke:
  stage: verify
  <<: *rules-mr
  script:
    - go run ./cmd/grounder --check

# The generated wire contracts must not drift from the served surface (INV-15, spec/006 REQ-501b).
contracts-drift:
  stage: verify
  <<: *rules-mr
  script:
    - go run ./tools/gencontracts/cmd/gencontracts -check

# spec/009 REQ-908 / INV-13: on any Helm chart change, run `helm lint` + a `helm template` render and
# scan the rendered manifests for a literal credential — fail the pipeline on a lint error or any hit.
helm-lint:
  stage: verify
  image:
    name: alpine/helm:3.16.2
    entrypoint: [""]
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: [deploy/helm/**/*]
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes: [deploy/helm/**/*]
  script:
    - apk add --no-cache bash grep
    - bash deploy/helm/ci/helm-lint.sh

# spec/010: the operator console — typecheck + vitest oracles run on any frontend change.
frontend:
  stage: verify
  image: node:20
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: [frontend/**/*]
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes: [frontend/**/*]
  script:
    - cd frontend
    - npm ci
    - npm run typecheck
    - npm test

# #55: the SERVED operator console is deploy/console/v2/index.html (the console Dockerfile overwrites the
# built React index with it). index.html is a BUILD ARTIFACT of deploy/console/v2/assemble.py + modules/*;
# this job fails if the committed index.html drifts from what assemble.py produces, so the pipeline can
# never silently stop being its source of truth (and index.html can never be hand-edited ahead of source).
console-drift:
  stage: verify
  image: python:3.12-slim
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes: [deploy/console/v2/**/*]
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes: [deploy/console/v2/**/*]
  script:
    - python3 deploy/console/v2/assemble.py --check

# --- Scheduled self-monitoring TREND-WATCH (TG-43; drift-split TG-64) -------------------------------------
# "Eval gates deploys" as a TOOLED gate, not a hand-run discipline. TG's CI has no Postgres/Temporal/model
# gateway, so the LLM-judge eval CANNOT run on the normal MR pipeline (it would always fail) — the model
# lives on the box (dc1tg01 loopback LiteLLM). So this job runs ONLY on a SCHEDULE: it SSH-tunnels the
# box and runs `make eval-drift` (the TREND-WATCH — NOT the pre-merge change gate). Trend mode measures a
# CLEAN main run vs the COMMITTED baseline for long-horizon drift, opens/updates a YouTrack issue on a
# genuine regression, and SELF-REFRESHES eval/baseline-scorecard.json on a clean, non-regressing run so the
# anchor tracks main and never goes stale (the staleness that TG-64 fixed for the pre-merge gate). The pre-
# merge gate (`make eval-gate`) uses a fresh origin/main base arm instead and is NEVER run here.
#
# SET UP (Settings -> CI/CD -> Schedules): add a NIGHTLY schedule (e.g. cron "0 3 * * *", target branch main).
# REQUIRED CI/CD variables (Settings -> CI/CD -> Variables) — the job SKIPS CLEANLY if TG_EVAL_SSH_KEY is
# absent, so simply adding this job never reds a pipeline:
#   TG_EVAL_SSH_KEY         — File-type var: the private key that can SSH root@dc1tg01 (read-only eval access; the eval never actuates)
#   YT_URL, YT_TOKEN        — (optional) YouTrack base URL + permanent token, to auto-file a regression issue in project TG
#   TG_BASELINE_PUSH_TOKEN  — (optional) a write_repository token; if set, the self-refreshed baseline is committed+pushed to main
#   TG_BOX                  — (optional) override the ssh target (default root@dc1tg01)
#   TG_EVAL_RUNS            — (optional) pooled runs per trend measurement (default 2 for the nightly)
eval-gate-scheduled:
  stage: verify
  image: golang:1.25.12
  timeout: 2h
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
  variables:
    TG_BOX: "root@dc1tg01"
    TG_EVAL_RUNS: "2"
  before_script:
    - apt-get update -qq && apt-get install -y -qq openssh-client jq curl make >/dev/null 2>&1 || true
  script:
    - |
      set -u
      # Fail-safe: a missing SSH key SKIPS cleanly (exit 0) — the job is opt-in via CI variables.
      if [ -z "${TG_EVAL_SSH_KEY:-}" ]; then
        echo "TG_EVAL_SSH_KEY not set — scheduled eval gate SKIPPED (configure it to enable)."; exit 0
      fi
      KEY="$(mktemp)"; chmod 600 "$KEY"
      if [ -f "$TG_EVAL_SSH_KEY" ]; then cp "$TG_EVAL_SSH_KEY" "$KEY"; else printf '%s\n' "$TG_EVAL_SSH_KEY" > "$KEY"; fi
      export TG_SSH_KEY="$KEY"
      mkdir -p ~/.ssh && ssh-keyscan -H "${TG_BOX#*@}" >> ~/.ssh/known_hosts 2>/dev/null || true
      # Best-effort connectivity probe — an unreachable box is INFRA, not a regression, so skip (exit 0).
      if ! ssh -i "$KEY" -o BatchMode=yes -o ConnectTimeout=10 -o StrictHostKeyChecking=no "$TG_BOX" true 2>/dev/null; then
        echo "box $TG_BOX unreachable from CI — scheduled eval gate SKIPPED (infra, not a regression)."; exit 0
      fi
      # Run the TREND-WATCH; capture the report. Non-zero here (after a good probe) = a real regression vs the
      # committed baseline. A clean, non-regressing run self-refreshes eval/baseline-scorecard.json in place.
      set +e
      make eval-drift 2>&1 | tee eval-gate-report.txt
      RC=${PIPESTATUS[0]}
      set -e
      if [ "$RC" -ne 0 ]; then
        echo "REGRESSION: scheduled trend-watch FAILED vs the committed baseline — filing a tracking issue (baseline NOT refreshed)."
        bash eval/ci/open-regression-issue.sh eval-gate-report.txt || true
        exit 1
      fi
      echo "scheduled trend-watch PASS — the on-box grounding eval holds the committed baseline."
      # Self-refresh push (fail-safe): if the trend-watch rewrote the committed baseline and a push token is
      # configured, commit+push it to main so the anchor auto-updates. Missing token / no change / push
      # failure all skip cleanly — never red a PASSing nightly.
      if [ -n "${TG_BASELINE_PUSH_TOKEN:-}" ] && ! git diff --quiet -- eval/baseline-scorecard.json; then
        git config user.name "Kyriakos Papadopoulos"
        git config user.email "ncpjfuzl@mxmx.email"
        git add eval/baseline-scorecard.json
        git commit -m "chore(eval): auto-refresh trend baseline from the nightly drift-watch [skip ci]" || true
        PUSH_URL="https://oauth2:${TG_BASELINE_PUSH_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
        git push "$PUSH_URL" "HEAD:${CI_DEFAULT_BRANCH}" 2>/dev/null \
          && echo "trend baseline auto-refreshed and pushed to ${CI_DEFAULT_BRANCH}." \
          || echo "warn: could not push the refreshed baseline (token/permissions) — see the artifact instead."
      fi
  artifacts:
    when: always
    paths: [eval-gate-report.txt, eval/out/, eval/baseline-scorecard.json]
    expire_in: 30 days

# --- Build & push the images to the GitLab Container Registry --------------------------------------------
# GitOps: CI builds the image once and pushes a content-addressed (:$CI_COMMIT_SHORT_SHA) + moving (:latest)
# tag; the production host only PULLs it (see deploy below). This replaces the old rsync-source +
# build-on-host job — no build toolchain and no source tree ever land on the box. Runs on the shared
# `docker`-tagged runners (host docker.sock, no dind), mirroring the established app-repo pattern.
.image-build:
  stage: docker
  tags: [docker]
  image: docker:28
  interruptible: false
  timeout: 40m
  cache: []
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  before_script:
    - apk add --no-cache bash
    - docker info >/dev/null 2>&1 || { echo "FATAL — host docker.sock not reachable. The runner's [runners.docker].volumes must include '/var/run/docker.sock:/var/run/docker.sock'."; exit 1; }
    # Built-in job credentials first; a project deploy token (REGISTRY_USER/REGISTRY_PASSWORD, write_registry)
    # overrides it when the instance JWT layer blocks CI_JOB_TOKEN pushes.
    - echo "$CI_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" --password-stdin
    - if [ -n "$REGISTRY_PASSWORD" ]; then echo "$REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" -u "$REGISTRY_USER" --password-stdin; fi

image-grounder:
  extends: .image-build
  needs: ["build-test"]
  script:
    - SHA="${CI_COMMIT_SHORT_SHA:-manual}"
    - docker build --pull --build-arg BIN=grounder -f deploy/Dockerfile -t "$TG_GROUNDER_IMAGE:$SHA" -t "$TG_GROUNDER_IMAGE:latest" .
    - docker push "$TG_GROUNDER_IMAGE:$SHA"
    - docker push "$TG_GROUNDER_IMAGE:latest"

image-worker:
  extends: .image-build
  needs: ["build-test"]
  script:
    - SHA="${CI_COMMIT_SHORT_SHA:-manual}"
    - docker build --pull --build-arg BIN=worker -f deploy/Dockerfile -t "$TG_WORKER_IMAGE:$SHA" -t "$TG_WORKER_IMAGE:latest" .
    - docker push "$TG_WORKER_IMAGE:$SHA"
    - docker push "$TG_WORKER_IMAGE:latest"

image-console:
  extends: .image-build
  needs: []
  script:
    - SHA="${CI_COMMIT_SHORT_SHA:-manual}"
    - docker build --pull -f deploy/console/Dockerfile -t "$TG_CONSOLE_IMAGE:$SHA" -t "$TG_CONSOLE_IMAGE:latest" .
    - docker push "$TG_CONSOLE_IMAGE:$SHA"
    - docker push "$TG_CONSOLE_IMAGE:latest"

# --- Supply-chain: sign every deployed image with the OpenBao-held cosign key (spec/022 REQ-2206, TG-155) ---
# The private key + password live ONLY in OpenBao (secret/tg/cosign); this job fetches them via a READ-SCOPED
# token (OPENBAO_TOKEN, never root) into a tmp dir, signs the pushed $SHA digests, and shreds them. Fail-closed:
# the deploy job `needs` cosign-verify, so an image that cannot be signed+verified never reaches the estate —
# the HuggingFace-class "swap a trusted image in the registry" attack cannot reach production.
# REQUIRES CI/CD variables OPENBAO_ADDR + OPENBAO_TOKEN (masked+protected; set via the API, never committed).
cosign-sign:
  extends: .image-build
  needs: ["image-grounder", "image-worker", "image-console"]
  script:
    - SHA="${CI_COMMIT_SHORT_SHA:-manual}"
    - bash scripts/cosign-sign.sh "$TG_GROUNDER_IMAGE:$SHA" "$TG_WORKER_IMAGE:$SHA" "$TG_CONSOLE_IMAGE:$SHA"

# SLSA-style build provenance (TG-158): attach a signed in-toto/CycloneDX attestation of the build SBOM to
# each deployed image's registry entry, so the image carries a VERIFIABLE statement of what was built into it
# (not just a signature of the digest). cosign attest requires the image to be signed FIRST, so this needs
# cosign-sign (which produced the signature) and the sbom job (which produced the predicate). The SBOM is the
# provenance payload: the attestation binds image→SBOM under the same OpenBao-held key; a deploy/consumer can
# `cosign verify-attestation` to confirm the supply-chain provenance before trusting the image. Same fail-closed
# token discipline as cosign-sign (OpenBao READ-scoped token, shredded on exit).
cosign-attest:
  extends: .image-build
  needs: ["cosign-sign", "sbom"]
  script:
    - SHA="${CI_COMMIT_SHORT_SHA:-manual}"
    - 'test -f sbom.cyclonedx.json || { echo "FATAL: SBOM predicate missing (sbom job artifact)"; exit 1; }'
    - export COSIGN_ATTEST_PREDICATE=sbom.cyclonedx.json COSIGN_ATTEST_TYPE=cyclonedx
    - bash scripts/cosign-sign.sh "$TG_GROUNDER_IMAGE:$SHA" "$TG_WORKER_IMAGE:$SHA" "$TG_CONSOLE_IMAGE:$SHA"

# Independent proof the signed images verify against the COMMITTED public key (deploy/cosign.pub). The verify
# side holds NO secret (public key only), so the same check runs on the production host before `up -d` (AWX
# playbook). This job is the pre-deploy gate: deploy `needs` it, so an unsigned/mis-signed image blocks CD.
cosign-verify:
  extends: .image-build
  needs: ["cosign-sign"]
  script:
    - SHA="${CI_COMMIT_SHORT_SHA:-manual}"
    - bash scripts/cosign-verify.sh "$TG_GROUNDER_IMAGE:$SHA" "$TG_WORKER_IMAGE:$SHA" "$TG_CONSOLE_IMAGE:$SHA"

# --- Deploy to dc1tg01 via AWX (GitOps, not SSH) -----------------------------------------------------
# Triggers the AWX job template that runs the deploy playbook on the LXC: registry login → docker compose
# pull (the tag built above) → up -d → health gate. Manual (click-to-deploy) on main so a deploy is an
# explicit act; flip `when` to on_success to auto-deploy every green main. Actuation on the box is governed by
# the mode chokepoint (owner-set live mode; absent/corrupt ⇒ Shadow, no actuate) — the deploy never changes it.
# REQUIRES these CI/CD variables (Settings → CI/CD → Variables), never committed:
#   AWX_TOKEN            — bearer token for the AWX API (masked, protected)
#   AWX_TG_TEMPLATE_ID   — the "Deploy Territory Grounder" AWX job-template id
#   AWX_HOST             — (optional) AWX base URL; defaults to https://awx.example.net
deploy:
  stage: deploy
  tags: [docker]
  # The org's shared deploy-helper image (curl+jq+bash pre-baked) for AWX-trigger jobs. TG (project 48) is
  # on the infra project's CI-job-token allowlist, so this project's job token can pull it.
  image: registry-gitlab.example.net/infrastructure/dc1/production/ci-deploy-tools:latest
  # cosign-verify gates the deploy (fail-closed supply chain): no unsigned/mis-signed image reaches the box.
  needs: ["image-grounder", "image-worker", "image-console", "cosign-verify"]
  rules:
    # Automatic on green main (continuous deployment). The deploy is best-effort (allow_failure) so an
    # operational hiccup on the box never reds an otherwise-green main; the AWX job status is authoritative.
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: on_success
      allow_failure: true
  variables:
    AWX_HOST: "https://awx.example.net"
  script:
    - |
      set -eu
      : "${AWX_TOKEN:?set the AWX_TOKEN CI variable}"
      : "${AWX_TG_TEMPLATE_ID:?set the AWX_TG_TEMPLATE_ID CI variable}"
      : "${TG_DEPLOY_TOKEN:?set the TG_DEPLOY_TOKEN CI variable (read_repository+read_registry deploy token)}"
      : "${TG_DEPLOY_TOKEN_USER:?set the TG_DEPLOY_TOKEN_USER CI variable}"
      SHA="${CI_COMMIT_SHORT_SHA:-latest}"
      # The playbook uses this token ON THE HOST to log in to the registry (pull the images) and clone the
      # deploy/ dir. It must be a project deploy token with read_registry+read_repository — the instance JWT
      # layer rejects $CI_JOB_TOKEN for registry auth (same reason image push needs REGISTRY_PASSWORD).
      EXTRA=$(jq -nc --arg tag "$SHA" --arg tok "$TG_DEPLOY_TOKEN" --arg usr "$TG_DEPLOY_TOKEN_USER" \
        '{extra_vars: {image_tag: $tag, gitlab_token: $tok, gitlab_token_user: $usr}}')
      RESP=$(curl -skf -X POST -H "Authorization: Bearer $AWX_TOKEN" -H "Content-Type: application/json" \
        -d "$EXTRA" "${AWX_HOST%/}/api/v2/job_templates/${AWX_TG_TEMPLATE_ID}/launch/")
      JOB_ID=$(echo "$RESP" | jq -r '.job // .id // empty')
      [ -n "$JOB_ID" ] || { echo "AWX launch failed: $RESP"; exit 1; }
      echo "AWX job $JOB_ID launched (image_tag=$SHA); polling..."
      for i in $(seq 1 60); do
        S=$(curl -sk -H "Authorization: Bearer $AWX_TOKEN" "${AWX_HOST%/}/api/v2/jobs/${JOB_ID}/" | jq -r '.status')
        echo "  job $JOB_ID: $S"
        case "$S" in
          successful) echo "deploy OK"; exit 0 ;;
          failed|error|canceled) echo "AWX job $JOB_ID $S — see $AWX_HOST/#/jobs/playbook/$JOB_ID"; exit 1 ;;
        esac
        sleep 10
      done
      echo "timed out waiting for AWX job $JOB_ID"; exit 1

# ── Public-mirror sync ────────────────────────────────────────────────────────
# Produces the SANITIZED public GitHub mirror. Deliberately `when: manual` — it
# NEVER runs automatically; a maintainer triggers it from the pipeline UI once a
# public release is intended. The internal GitLab repo keeps real hosts/domain;
# github-sync/sync-to-github.sh strips history, renames the Go module path,
# genericizes infra identifiers, runs multi-pass gitleaks, and REFUSES to push if
# any real identifier survives (abort-on-survivor). Needs CI vars GITHUB_REPO +
# GITHUB_TOKEN (masked). Run with a dry run first: set DRY_RUN=1.
sync_to_github:
  stage: sync
  image: debian:stable-slim
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: on_success
      allow_failure: true
  resource_group: github_mirror_push   # serialize: concurrent force-pushes race on refs/heads/main
  # Fetch NO artifacts: this job clones the repo fresh into '.' (GIT_STRATEGY: empty), so any downloaded
  # artifact (e.g. sbom's) would leave '.' non-empty and break `git clone . ` with "destination path '.'
  # already exists and is not an empty directory". dependencies:[] keeps the sync in the last stage
  # (on_success) but pulls no artifacts — needs:[] would wrongly start it before the build.
  dependencies: []
  variables:
    GIT_STRATEGY: empty
    GITLEAKS_VERSION: "8.24.0"
  before_script:
    - apt-get update -qq && apt-get install -y -qq git curl jq golang ca-certificates >/dev/null 2>&1
    - git clone -q "$CI_REPOSITORY_URL" .
    - git -c advice.detachedHead=false checkout -q "$CI_COMMIT_SHA"
    - pip3 install --break-system-packages git-filter-repo >/dev/null 2>&1 || (apt-get install -y -qq git-filter-repo >/dev/null 2>&1)
    - curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar xz -C /usr/local/bin gitleaks && gitleaks version
  script:
    - |
      if [ "${DRY_RUN:-0}" = "1" ]; then
        bash github-sync/sync-to-github.sh --dry-run --verbose
      else
        : "${GITHUB_REPO:?set GITHUB_REPO CI variable}" "${GITHUB_TOKEN:?set GITHUB_TOKEN CI variable}"
        bash github-sync/sync-to-github.sh
      fi
