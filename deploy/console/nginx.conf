# Serves the operator console SPA and proxies /api to the grounder control-plane over the compose network.
# The API stays auth-gated; an unauthenticated browser call resolves to the console's restrictive state.
server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;
  charset utf-8; # the console is a UTF-8 single-file app; without this browsers fall back to windows-1252 (mojibake)

  # SPA fallback: client-side routes resolve to index.html.
  # index.html is a single self-contained bundle that changes on EVERY deploy. Without an explicit
  # cache directive, browsers apply heuristic caching and can serve a STALE bundle for hours without
  # revalidating — which strands operators on an old (possibly broken) console after a deploy. no-cache
  # means "cache it, but ALWAYS revalidate against the etag before use", so a deploy is picked up on the
  # next request. (The bundle is inlined — there are no separately-hashed long-cache assets to protect.)
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache" always;
  }

  # API proxy → the grounder container (internal compose DNS name).
  location /api/ {
    proxy_pass http://grounder:8080/;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $remote_addr;
  }

  # health of the console container itself.
  location = /console-healthz { return 200 'ok'; add_header Content-Type text/plain; }
}
