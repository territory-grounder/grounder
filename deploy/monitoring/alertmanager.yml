# Alertmanager routing for the Territory Grounder canary safety alerts.
#
# Self-contained by default: the receiver is an empty sink, so the stack runs with no external secret and
# alerts are visible in the Alertmanager UI (:9093). A real deployment wires a webhook/Matrix/Slack/PagerDuty
# receiver here — config-not-code, every credential a secret reference, never a literal in-repo. Critical
# alerts (UnexpectedMutationEnabled, MutationBreakerOpen) repeat aggressively.
route:
  receiver: default
  group_by: ["alertname", "component"]
  group_wait: 10s
  group_interval: 1m
  repeat_interval: 1h
  routes:
    - matchers:
        - severity="critical"
      receiver: default
      group_wait: 0s
      repeat_interval: 5m

receivers:
  - name: default
    # No notifier configured (self-contained default). Alerts still fire and are visible at http://<host>:9093.
    # To page: add e.g. a webhook_configs / slack_configs / matrix block here with a secret-referenced URL.
