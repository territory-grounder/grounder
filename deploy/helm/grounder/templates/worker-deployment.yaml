{{/* Runner worker Deployment — the Temporal poller/executor of the tg.runner task queue (spec/009 REQ-902
     parity with the compose `worker` service). Without it the API enqueues triage workflows nothing runs. */}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "grounder.componentName" (dict "root" . "component" "worker") }}
  labels:
    {{- include "grounder.labels" . | nindent 4 }}
    {{- include "grounder.selectorLabels" (dict "root" . "component" "worker") | nindent 4 }}
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      {{- include "grounder.selectorLabels" (dict "root" . "component" "worker") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "grounder.labels" . | nindent 8 }}
        {{- include "grounder.selectorLabels" (dict "root" . "component" "worker") | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.worker.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: {{ .Values.worker.securityContext.runAsNonRoot }}
        seccompProfile:
          {{- toYaml .Values.worker.securityContext.seccompProfile | nindent 10 }}
      # Ordering parity with compose `depends_on: postgres: service_healthy`: block the worker until the
      # application Postgres answers. The Temporal client itself retries the frontend until it is reachable.
      initContainers:
        - name: wait-for-postgres
          image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          command:
            - sh
            - -c
            - >-
              until pg_isready -h {{ include "grounder.componentName" (dict "root" . "component" "postgres") }}
              -p {{ .Values.postgres.port }} -U {{ .Values.postgres.superuser }};
              do echo "waiting for postgres"; sleep 2; done
          securityContext:
            runAsNonRoot: true
            runAsUser: {{ .Values.worker.securityContext.runAsUser }}
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      containers:
        - name: worker
          image: {{ include "grounder.workerImage" . | quote }}
          imagePullPolicy: {{ .Values.worker.image.pullPolicy }}
          securityContext:
            runAsNonRoot: {{ .Values.worker.securityContext.runAsNonRoot }}
            runAsUser: {{ .Values.worker.securityContext.runAsUser }}
            runAsGroup: {{ .Values.worker.securityContext.runAsGroup }}
            readOnlyRootFilesystem: {{ .Values.worker.securityContext.readOnlyRootFilesystem }}
            allowPrivilegeEscalation: {{ .Values.worker.securityContext.allowPrivilegeEscalation }}
            capabilities:
              {{- toYaml .Values.worker.securityContext.capabilities | nindent 14 }}
            seccompProfile:
              {{- toYaml .Values.worker.securityContext.seccompProfile | nindent 14 }}
          env:
            # Phase 0/1 read-only foundation: actuation OFF by construction (spec/009 REQ-906 / INV-09). The
            # retired TG_MUTATION_ENABLED knob has been ABSORBED into the mode chokepoint (spec/015 REQ-1520):
            # the worker boots read-only (mode Shadow, the durable default) and enabling actuation is an
            # operator-authorized, audited mode transition, never a deploy-time env flag.
            {{- range $k, $v := .Values.worker.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            # credentials by reference, never literals (spec/009 REQ-904 / INV-13)
            {{- include "grounder.secretEnv" (dict "root" . "name" "TG_RUNTIME_DSN" "key" .Values.secrets.keys.runtimeDSN) | nindent 12 }}
            {{- include "grounder.secretEnv" (dict "root" . "name" "LITELLM_MASTER_KEY" "key" .Values.secrets.keys.litellmMasterKey) | nindent 12 }}
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        # writable scratch so the read-only root filesystem stays enforced
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
