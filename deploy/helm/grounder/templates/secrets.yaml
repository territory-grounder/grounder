{{/*
Credential sourcing — by reference, NEVER a literal (spec/009 REQ-904 / INV-13).

  secrets.mode=reference : the operator supplies the Kubernetes Secret out-of-band; this chart renders
                           NOTHING here (no literal ever touches the manifest).
  secrets.mode=external  : an ExternalSecret (External Secrets Operator) resolves each key from an
                           upstream store into the target Secret. Still no literal in the chart.

The CI gate (spec/009 REQ-908) greps the rendered output for credential patterns and fails on any hit.
*/}}
{{- if eq .Values.secrets.mode "external" }}
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Values.secrets.name }}
  labels:
    {{- include "grounder.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.secrets.externalSecretStore.refreshInterval | quote }}
  secretStoreRef:
    kind: {{ .Values.secrets.externalSecretStore.kind }}
    name: {{ required "secrets.externalSecretStore.name is required in external mode" .Values.secrets.externalSecretStore.name }}
  target:
    name: {{ .Values.secrets.name }}
    creationPolicy: Owner
  data:
    {{- range $logical, $key := .Values.secrets.keys }}
    - secretKey: {{ $key }}
      remoteRef:
        key: {{ $key }}
    {{- end }}
{{- else }}
# secrets.mode=reference — the Secret named {{ .Values.secrets.name }} is supplied OUT-OF-BAND.
# This chart deliberately renders no Secret body so that no credential literal can enter a manifest.
# Expected keys (values provided out-of-band, never here):
{{- range $logical, $key := .Values.secrets.keys }}
#   - {{ $key }}
{{- end }}
{{- end }}
