      TG_OPENBAO_KV_MOUNT: ${TG_OPENBAO_KV_MOUNT:-}
      TG_OPENBAO_KV_PREFIX: ${TG_OPENBAO_KV_PREFIX:-}
      OPENBAO_TOKEN: ${OPENBAO_TOKEN:-}
      OPENBAO_ROLE_ID: ${OPENBAO_ROLE_ID:-}
      OPENBAO_SECRET_ID: ${OPENBAO_SECRET_ID:-}
