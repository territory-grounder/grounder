      TG_SUPPRESSION_REBOOT_PRE_BUFFER: ${TG_SUPPRESSION_REBOOT_PRE_BUFFER:-}
      TG_SUPPRESSION_REBOOT_WINDOW: ${TG_SUPPRESSION_REBOOT_WINDOW:-}
      TG_SUPPRESSION_FOLDS_FILE: ${TG_SUPPRESSION_FOLDS_FILE:-}
      # --- Observability export: OpenObserve / Langfuse / Healthchecks (endpoints + refs + referenced secrets) ---
      TG_OBSERVABILITY_EXPORT_INTERVAL: ${TG_OBSERVABILITY_EXPORT_INTERVAL:-}
      TG_OPENOBSERVE_URL: ${TG_OPENOBSERVE_URL:-}
      TG_OPENOBSERVE_TOKEN_REF: ${TG_OPENOBSERVE_TOKEN_REF:-${OPENOBSERVE_TOKEN:+env:OPENOBSERVE_TOKEN}}
      OPENOBSERVE_TOKEN: ${OPENOBSERVE_TOKEN:-}
      TG_LANGFUSE_URL: ${TG_LANGFUSE_URL:-}
      # Langfuse PUBLIC key is non-secret + gate-exempt, but use the same enforce-ready idiom as its SECRET
      # sibling for consistency (unconfigured ⇒ empty ⇒ tracing simply off).
      TG_LANGFUSE_PUBLIC_REF: ${TG_LANGFUSE_PUBLIC_REF:-${LANGFUSE_PUBLIC_KEY:+env:LANGFUSE_PUBLIC_KEY}}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      TG_LANGFUSE_SECRET_REF: ${TG_LANGFUSE_SECRET_REF:-${LANGFUSE_SECRET_KEY:+env:LANGFUSE_SECRET_KEY}}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      TG_HEALTHCHECKS_URL: ${TG_HEALTHCHECKS_URL:-}
      TG_HEALTHCHECKS_CHECK_REF: ${TG_HEALTHCHECKS_CHECK_REF:-${HEALTHCHECKS_UUID:+env:HEALTHCHECKS_UUID}}
      HEALTHCHECKS_UUID: ${HEALTHCHECKS_UUID:-}
      # --- Notifiers / ITSM (approval routing + ticketing). Each channel: endpoint(s) + a token REF + the
      # referenced secret as ${NAME:-}. All optional; unset ⇒ that channel is simply not wired. ---
      # ENFORCE-READY REF IDIOM (all OPTIONAL secret refs below + semaphore/observability above):
      #   ${TG_X_REF:-${RAW:+env:RAW}}  — explicit ref wins; else if the raw value is set, point at it
      #   (env:RAW, backward-compatible); else EMPTY. An unconfigured integration therefore renders "" (not
      #   env:RAW-pointing-at-nothing), so the TG_SECRET_POLICY gate SKIPS it (empty ⇒ feature off) instead of
      #   flagging a plaintext scheme — the only thing that let unused channels block `enforce`. Functionally
      #   identical to the old `${TG_X_REF:-env:RAW}` in every configured case; the change is intentional, not a
      #   byte-identity regression. CORE/required refs keep the plain `${TG_X_REF:-env:RAW}` form (they must be
      #   configured anyway, and the gate's plaintext message then guides the operator to a backend).
      # YouTrack
      TG_YOUTRACK_URL: ${TG_YOUTRACK_URL:-}
      TG_YOUTRACK_TOKEN_REF: ${TG_YOUTRACK_TOKEN_REF:-${YOUTRACK_TOKEN:+env:YOUTRACK_TOKEN}}
      YOUTRACK_TOKEN: ${YOUTRACK_TOKEN:-}
      TG_YOUTRACK_STATE_INPROGRESS: ${TG_YOUTRACK_STATE_INPROGRESS:-}
      TG_YOUTRACK_STATE_RESOLVED: ${TG_YOUTRACK_STATE_RESOLVED:-}
      TG_YOUTRACK_STATE_OPEN: ${TG_YOUTRACK_STATE_OPEN:-}
      TG_YOUTRACK_STATE_FIELD: ${TG_YOUTRACK_STATE_FIELD:-}
      # Jira
      TG_JIRA_URL: ${TG_JIRA_URL:-}
      TG_JIRA_EMAIL: ${TG_JIRA_EMAIL:-}
      TG_JIRA_TOKEN_REF: ${TG_JIRA_TOKEN_REF:-${JIRA_TOKEN:+env:JIRA_TOKEN}}
      JIRA_TOKEN: ${JIRA_TOKEN:-}
      TG_JIRA_TRANSITION_INPROGRESS: ${TG_JIRA_TRANSITION_INPROGRESS:-}
      TG_JIRA_TRANSITION_RESOLVED: ${TG_JIRA_TRANSITION_RESOLVED:-}
      TG_JIRA_TRANSITION_OPEN: ${TG_JIRA_TRANSITION_OPEN:-}
      # GitHub
      TG_GITHUB_URL: ${TG_GITHUB_URL:-}
      TG_GITHUB_OWNER: ${TG_GITHUB_OWNER:-}
      TG_GITHUB_REPO: ${TG_GITHUB_REPO:-}
      TG_GITHUB_TOKEN_REF: ${TG_GITHUB_TOKEN_REF:-${GITHUB_TOKEN:+env:GITHUB_TOKEN}}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      # ServiceNow
      TG_SERVICENOW_URL: ${TG_SERVICENOW_URL:-}
      TG_SERVICENOW_USER: ${TG_SERVICENOW_USER:-}
      TG_SERVICENOW_TOKEN_REF: ${TG_SERVICENOW_TOKEN_REF:-${SERVICENOW_TOKEN:+env:SERVICENOW_TOKEN}}
      SERVICENOW_TOKEN: ${SERVICENOW_TOKEN:-}
      TG_SERVICENOW_STATE_INPROGRESS: ${TG_SERVICENOW_STATE_INPROGRESS:-}
      TG_SERVICENOW_STATE_RESOLVED: ${TG_SERVICENOW_STATE_RESOLVED:-}
      TG_SERVICENOW_STATE_OPEN: ${TG_SERVICENOW_STATE_OPEN:-}
      # Matrix
      TG_MATRIX_HOMESERVER: ${TG_MATRIX_HOMESERVER:-}
      TG_MATRIX_TOKEN_REF: ${TG_MATRIX_TOKEN_REF:-${MATRIX_TOKEN:+env:MATRIX_TOKEN}}
      MATRIX_TOKEN: ${MATRIX_TOKEN:-}
      TG_MATRIX_APPROVERS: ${TG_MATRIX_APPROVERS:-}
      TG_MATRIX_ROOMS: ${TG_MATRIX_ROOMS:-}
      TG_MATRIX_DEFAULT_ROOM: ${TG_MATRIX_DEFAULT_ROOM:-}
      # Slack
      TG_SLACK_URL: ${TG_SLACK_URL:-}
      TG_SLACK_TOKEN_REF: ${TG_SLACK_TOKEN_REF:-${SLACK_TOKEN:+env:SLACK_TOKEN}}
      SLACK_TOKEN: ${SLACK_TOKEN:-}
      TG_SLACK_APPROVERS: ${TG_SLACK_APPROVERS:-}
      TG_SLACK_CHANNELS: ${TG_SLACK_CHANNELS:-}
      TG_SLACK_DEFAULT_CHANNEL: ${TG_SLACK_DEFAULT_CHANNEL:-}
      # Microsoft Teams
      TG_TEAMS_URL: ${TG_TEAMS_URL:-}
      TG_TEAMS_CONVERSATION: ${TG_TEAMS_CONVERSATION:-}
      TG_TEAMS_TOKEN_REF: ${TG_TEAMS_TOKEN_REF:-${TEAMS_TOKEN:+env:TEAMS_TOKEN}}
      TEAMS_TOKEN: ${TEAMS_TOKEN:-}
      TG_TEAMS_APPROVERS: ${TG_TEAMS_APPROVERS:-}
      # Email (SMTP)
      TG_EMAIL_SMTP: ${TG_EMAIL_SMTP:-}
      TG_EMAIL_FROM: ${TG_EMAIL_FROM:-}
      TG_EMAIL_TO: ${TG_EMAIL_TO:-}
      TG_EMAIL_APPROVERS: ${TG_EMAIL_APPROVERS:-}
      TG_EMAIL_SMTP_USER: ${TG_EMAIL_SMTP_USER:-}
      TG_EMAIL_SMTP_TOKEN_REF: ${TG_EMAIL_SMTP_TOKEN_REF:-${EMAIL_SMTP_PASSWORD:+env:EMAIL_SMTP_PASSWORD}}
      EMAIL_SMTP_PASSWORD: ${EMAIL_SMTP_PASSWORD:-}
      # Twilio (SMS / voice)
      TG_TWILIO_URL: ${TG_TWILIO_URL:-}
      TG_TWILIO_SID: ${TG_TWILIO_SID:-}
      TG_TWILIO_FROM: ${TG_TWILIO_FROM:-}
      TG_TWILIO_TO: ${TG_TWILIO_TO:-}
      TG_TWILIO_TOKEN_REF: ${TG_TWILIO_TOKEN_REF:-${TWILIO_TOKEN:+env:TWILIO_TOKEN}}
      TWILIO_TOKEN: ${TWILIO_TOKEN:-}
      # Mattermost
      TG_MATTERMOST_URL: ${TG_MATTERMOST_URL:-}
      TG_MATTERMOST_TOKEN_REF: ${TG_MATTERMOST_TOKEN_REF:-${MATTERMOST_TOKEN:+env:MATTERMOST_TOKEN}}
      MATTERMOST_TOKEN: ${MATTERMOST_TOKEN:-}
      TG_MATTERMOST_APPROVERS: ${TG_MATTERMOST_APPROVERS:-}
      TG_MATTERMOST_CHANNELS: ${TG_MATTERMOST_CHANNELS:-}
      # --- Actuation Regime Engine (spec/017, TG-110) — WIRED but INERT (mutation stays OFF). ---
      # Config-not-code regime rules over the SHARED estate object-model, JSON:
      # [{"id":"awx-edge","selector":"group:awx-managed","regime":"awx-job"}]. Absent ⇒ every target takes
      # the default lane. Selecting/launching through a lane happens only post-flip (mode stays Shadow).
      TG_REGIME_RULES: ${TG_REGIME_RULES:-}
      # The default lane for an UNMATCHED target: native-ssh (the existing SSH effect leaf) or none (refuse).
      TG_REGIME_DEFAULT_LANE: ${TG_REGIME_DEFAULT_LANE:-native-ssh}
      # AWX-job lane (the first non-SSH mutating channel). ABSENT base URL / launch token ⇒ the lane keeps its
      # FAIL-CLOSED pendingActuator (it can only refuse). The launch token is DISTINCT from the sensor token.
      TG_AWXJOB_BASE_URL: ${TG_AWXJOB_BASE_URL:-}
      TG_AWXJOB_LAUNCH_TOKEN_REF: ${TG_AWXJOB_LAUNCH_TOKEN_REF:-}
      TG_AWXJOB_CA: ${TG_AWXJOB_CA:-}
      # Operator template allowlist + op-class bindings + typed extra_vars schema, JSON:
      # [{"template_id":42,"op_class":"restart-service","extra_vars":{"target_host":"string"}}]. Empty ⇒ the
      # actuator is read-only (it can only refuse); a template not on the allowlist is never launchable.
      TG_AWXJOB_ALLOWLIST: ${TG_AWXJOB_ALLOWLIST:-}
      # Proxmox VE hypervisor guest-lifecycle lane (start-guest). The proxmox effect leaf is wired ONLY with a
      # PVE API base URL (https://{host}:8006/api2/json/) AND a PVEAPIToken secret ref; ABSENT ⇒ the lane is
      # fail-closed pendingActuator (refuse only). Guests are allowlisted (comma/space-separated names);
      # empty ⇒ default-deny (no guest actuatable). _INSECURE opt-in disables TLS verify for the internal
      # self-signed :8006 cert. Lifecycle floor (reboot/shutdown/reset/destroy) is non-configurable in-code.
      TG_PROXMOX_BASE_URL: ${TG_PROXMOX_BASE_URL:-}
      TG_PROXMOX_TOKEN_REF: ${TG_PROXMOX_TOKEN_REF:-}
      TG_PROXMOX_ALLOWED_GUESTS: ${TG_PROXMOX_ALLOWED_GUESTS:-}
      TG_PROXMOX_INSECURE: ${TG_PROXMOX_INSECURE:-}
      # GLOBAL deferred-verify poll cron (armed only WITH an AWX launch client): poll interval + the bound
      # within which a launched job must reach a terminal or be recorded unverified. Inert at Shadow (empty queue).
      TG_REGIME_VERIFY_INTERVAL: ${TG_REGIME_VERIFY_INTERVAL:-1m}
      TG_REGIME_VERIFY_BOUND: ${TG_REGIME_VERIFY_BOUND:-30m}
      # Read-only playbooks-as-knowledge lane (T-017-5): pulls AWX runbooks READ-ONLY into the corpus. The
      # sensor token is READ-ONLY + DISTINCT from the launch token. Disabled unless all four are set.
      TG_AWXPLAYBOOKS_BASE_URL: ${TG_AWXPLAYBOOKS_BASE_URL:-}
      TG_AWXPLAYBOOKS_SENSOR_TOKEN_REF: ${TG_AWXPLAYBOOKS_SENSOR_TOKEN_REF:-}
      TG_AWXPLAYBOOKS_CA: ${TG_AWXPLAYBOOKS_CA:-}
      TG_AWXPLAYBOOKS_CORPUS: ${TG_AWXPLAYBOOKS_CORPUS:-}
      TG_AWXPLAYBOOKS_INTERVAL: ${TG_AWXPLAYBOOKS_INTERVAL:-}
    # Read-only secret material for the syslog-ng SSH reads: deploy/secrets/ on the box (gitignored —
    # only its .gitignore is committed) mounts at /secrets read-only; .env references file:/secrets/….
    # The knowledge mount is READ-WRITE here: the worker MAINTAINS the corpus (lessons merge + refresh);
    # the grounder mounts the same dir read-only to serve it as the wiki.
    volumes:
      - ./secrets:/secrets:ro
      - ./knowledge:/knowledge
    depends_on:
      postgres:
        condition: service_healthy
      litellm:
        condition: service_started
      temporal:
        condition: service_started
      secrets-perms:
        condition: service_completed_successfully

  # The operator console (spec/010): a read-only React SPA served by nginx, proxying /api to the grounder.
  # Published on 8080 so http://<host>:8080 shows the console. The static bundle carries no secret; the API
  # it calls stays auth-gated (an unauthenticated browser resolves to the console's restrictive state).
  console:
    image: ${TG_CONSOLE_IMAGE:-registry-github.com/territory-grounder/grounder/console}:${TG_TAG:-latest}
    build:
      context: ..
      dockerfile: deploy/console/Dockerfile
    depends_on:
      - grounder
    ports:
      - "8080:80" # operator console — reachable on the network at http://<host>:8080

  # --- Phase-2 canary monitoring: Prometheus scrape + Alertmanager + Grafana. READ-ONLY: they scrape the
  # grounder/worker /metrics; nothing here can mutate a managed estate. The load-bearing alert is
  # "mutation_enabled == 1" (an unexpected flip while the read-only foundation should hold OFF) — it pages
  # immediately. Prometheus + Alertmanager are the required minimum; Grafana renders the safety gauges.
  prometheus:
    image: prom/prometheus:v2.54.1@sha256:f6639335d34a77d9d9db382b92eeb7fc00934be8eae81dbc03b31cfe90411a94
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert.rules.yml:/etc/prometheus/alert.rules.yml:ro
      - promdata:/prometheus
    depends_on:
      - grounder
      - worker
    ports:
      - "127.0.0.1:9090:9090" # Prometheus UI — localhost only

  alertmanager:
    image: prom/alertmanager:v0.27.0@sha256:e13b6ed5cb929eeaee733479dce55e10eb3bc2e9c4586c705a4e8da41e5eacf5
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - "127.0.0.1:9093:9093" # Alertmanager UI — localhost only

  grafana:
    image: grafana/grafana:11.2.0@sha256:408afb9726de5122b00a2576763a8a57a3c86d5b0eff5305bc994ceb3eb96c3f
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafanadata:/var/lib/grafana
    depends_on:
      - prometheus
    ports:
      - "127.0.0.1:3000:3000" # Grafana UI — localhost only

volumes:
  pgdata:
  temporaldata:
  promdata:
  grafanadata:
