      # to their in-code defaults (10m / 200) when blank. ---
      TG_FALSIFIABILITY_SCORE_INTERVAL: ${TG_FALSIFIABILITY_SCORE_INTERVAL:-5m}
      TG_FALSIFIABILITY_WINDOW: ${TG_FALSIFIABILITY_WINDOW:-}
      TG_FALSIFIABILITY_BATCH: ${TG_FALSIFIABILITY_BATCH:-}
