      # grounder reports the TRUE posture on /v1/whoami + /v1/governance. Go duration; default 30s.
      TG_POSTURE_PUBLISH_INTERVAL: ${TG_POSTURE_PUBLISH_INTERVAL:-30s}
      # Mode-transition RBAC (spec/015 REQ-1502), the LAST gate before the mutation flip: comma-separated
      # operator ids explicitly authorized to flip the autonomy mode via POST /v1/mode. When set, ONLY
      # these operators may transition the mode (even an LDAP admin-group member not listed is denied);
      # when empty, an authenticated LDAP admin-group / static-admin operator is authorized. Empty default
      # ⇒ no auto-flip: a transition still needs an authenticated authorized operator AND a green preflight.
      TG_MODE_TRANSITION_OPERATORS: ${TG_MODE_TRANSITION_OPERATORS:-}
      # Deploy-time INITIAL autonomy mode (spec/015 REQ-1524): on a FRESH deployment only, seed this mode so
      # a pre-configured stack starts in the chosen posture without a manual /v1/mode flip. Values:
      # shadow (default) | hitl | semi-auto | full-auto. ABSENT-ONLY — never overrides an existing mode, so
      # it is a no-op on an established estate. Fail-closed: unset/invalid ⇒ Shadow; seeding into an actuating
      # mode still requires the green preflight and is ledger-audited. Leave EMPTY (Shadow) unless you
      # deliberately want a fresh deploy to start actuating (governed by every gate regardless).
      TG_INITIAL_MODE: ${TG_INITIAL_MODE:-}
      # HTTP timeout for estate topology pulls (LibreNMS /api/v0/devices is a whole-fleet request that can
      # exceed the old 15s). Go duration string; default 45s.
      TG_ESTATE_HTTP_TIMEOUT: ${TG_ESTATE_HTTP_TIMEOUT:-}
      # Opt-in: disable TLS verification for internal self-signed estate endpoints (LibreNMS, PVE :8006).
      # Default (unset/false) keeps strict verification. Scoped to the estate READ pollers only.
      TG_LIBRENMS_INSECURE: ${TG_LIBRENMS_INSECURE:-}
      TG_PVE_INSECURE: ${TG_PVE_INSECURE:-}
      # --- syslog-ng investigation reads (REQ-823): the agent's read-only device-log window. ---
      # Rows 'site|sshhost|sshuser|keyref|basepath'; the key ref is file:/secrets/<name> against the
      # read-only ./secrets mount below (key material lives on the box, NEVER in the repo). Absent ⇒
      # the agent simply has no syslog-ng tools.
      TG_SYSLOGNG_DEPLOYMENTS: ${TG_SYSLOGNG_DEPLOYMENTS:-}
      # MANDATORY alongside deployments: the OpenSSH known_hosts file pinning each syslog server's
      # host key. The native in-process SSH client fails closed without it — an unknown or changed
      # host key refuses the read; there is no insecure bypass.
      TG_SYSLOGNG_KNOWN_HOSTS: ${TG_SYSLOGNG_KNOWN_HOSTS:-}
      # --- host-diagnostics investigation reads: the agent's read-only SSH df/free/systemctl on the alerting
      # host (the predecessor's storage-specialist/triage-researcher ability). Rows 'site|hostglob|sshuser|
      # keyref' (';'-separated); the key ref is file:/secrets/<name> against the read-only ./secrets mount.
      # Absent ⇒ the agent has no host-diagnostics tools. Same fail-closed native SSH client as syslog-ng:
      # TG_HOSTDIAG_KNOWN_HOSTS pins each estate host's key or every read refuses. ---
      TG_HOSTDIAG_DEPLOYMENTS: ${TG_HOSTDIAG_DEPLOYMENTS:-}
      TG_HOSTDIAG_KNOWN_HOSTS: ${TG_HOSTDIAG_KNOWN_HOSTS:-}
      # --- actor-attribution journal/sudo reader (spec/023 REQ-2314): reads a host's own journal for
      # privileged sudo actions to answer WHO changed it. Same 'site|hostglob|sshuser|keyref' rows + the same
      # fail-closed native SSH client + mandatory known_hosts as host-diagnostics above; identity resolves
      # through the credential engine. Absent ⇒ the journal reader is not registered (journal subjects read
      # unattributable). ---
      TG_JOURNAL_DEPLOYMENTS: ${TG_JOURNAL_DEPLOYMENTS:-}
      TG_JOURNAL_KNOWN_HOSTS: ${TG_JOURNAL_KNOWN_HOSTS:-}
      # Attribution readers for the machine-automation + CMDB domains (spec/023 T-023-10). EXPLICIT opt-in
      # (empty = dormant): set truthy to arm — they reuse the already-configured TG_AWX_ADDR/TG_AWX_TOKEN_REF
      # and TG_NETBOX_URL/TG_NETBOX_TOKEN_REF (read-only). Arming changes triage semantics (transparency-gated).
      TG_AWX_ACTOREVIDENCE: ${TG_AWX_ACTOREVIDENCE:-}
      TG_NETBOX_ACTOREVIDENCE: ${TG_NETBOX_ACTOREVIDENCE:-}
      # GitOps MR-history attribution (spec/023 T-023-11): explicit opt-in; needs a GitLab instance URL +
      # project id/path + a READ-ONLY project token (never the deploy/admin token). Optional branch/prefix.
      TG_GITOPSMR_ACTOREVIDENCE: ${TG_GITOPSMR_ACTOREVIDENCE:-}
      TG_GITLAB_URL: ${TG_GITLAB_URL:-}
      TG_GITLAB_PROJECT: ${TG_GITLAB_PROJECT:-}
      TG_GITLAB_RO_TOKEN_REF: ${TG_GITLAB_RO_TOKEN_REF:-}
      TG_GITOPSMR_BRANCH: ${TG_GITOPSMR_BRANCH:-}
      TG_GITOPSMR_MANIFEST_PREFIX: ${TG_GITOPSMR_MANIFEST_PREFIX:-}
      # --- Retrieval plane (precedent RAG, spec/012): the corpus file + the semantic pgvector channel. ---
      # The corpus path is INSIDE the container — bind-mount the corpus (compose override) when enabling.
      # Semantic retrieval additionally needs TG_EMBED_MODEL served by the litellm gateway (see the
      # commented embedding example in litellm-config.yaml) and rides on TG_DB_DSN above; unset it stays
      # honestly disabled and retrieval is the transparent lexical ranking.
      # The worker READS the union of the read-only tracked seed (deploy-synced bootstrap precedents)
      # and the untracked maintained corpus it alone WRITES — the split is what makes runtime learning
      # survive a deploy (the deploy's copy overwrites tracked files, never untracked destination files).
      TG_KNOWLEDGE_FILE: ${TG_KNOWLEDGE_FILE:-/knowledge/corpus.maintained.json}
      TG_KNOWLEDGE_SEED_FILE: ${TG_KNOWLEDGE_SEED_FILE:-/knowledge/corpus.seed.json}
      TG_KNOWLEDGE_REFRESH_INTERVAL: ${TG_KNOWLEDGE_REFRESH_INTERVAL:-}
      TG_LESSONS_SOURCE_FILE: ${TG_LESSONS_SOURCE_FILE:-}
      TG_LESSONS_REFRESH_INTERVAL: ${TG_LESSONS_REFRESH_INTERVAL:-}
      # Recency/decay reconciliation (spec/018): TG_LESSONS_MAX_AGE (blank ⇒ 0 = pruning OFF) is the retention
      # horizon past which a lesson's provenance ages it out of the corpus, fired by the decay cron below.
      TG_LESSONS_MAX_AGE: ${TG_LESSONS_MAX_AGE:-}
      TG_EMBED_MODEL: ${TG_EMBED_MODEL:-}
      TG_EMBED_DIM: ${TG_EMBED_DIM:-}
      TG_EMBED_MIN_SIMILARITY: ${TG_EMBED_MIN_SIMILARITY:-}
      TG_EMBED_BACKFILL_INTERVAL: ${TG_EMBED_BACKFILL_INTERVAL:-}
      TG_EMBED_BACKFILL_BATCH: ${TG_EMBED_BACKFILL_BATCH:-}
      # =================================================================================================
      # Env-parity passthroughs (fix/compose-env-parity). Every knob below is read by cmd/worker/main.go
      # via the getenv family but was NOT previously forwarded here — so an operator override in .env was
      # silently dropped and the worker ran on its in-code default (the exact prod-gap class this branch
      # kills). Token knobs are secret REFERENCES (env:NAME) with the referenced secret passed alongside
      # as ${NAME:-} (never a literal value). All optional: unset ⇒ in-code default / feature-off.
      # deploy/envparity_test.go fails CI if any read key here regresses. Mutation stays OFF regardless.
      # --- Gate inputs: blast-radius width (default 8), criticality tiers, self-protected services ---
      TG_BLAST_RADIUS_WIDE_THRESHOLD: ${TG_BLAST_RADIUS_WIDE_THRESHOLD:-8}
      TG_CRITICALITY_TIER_HOSTS: ${TG_CRITICALITY_TIER_HOSTS:-}
      TG_SELF_PROTECTED_SERVICES: ${TG_SELF_PROTECTED_SERVICES:-}
      # Staged-canary allowlist file (REQ-009): a (host,op) here is FORCED to POLL_PAUSE (human vote). Empty ⇒ inert.
      TG_CANARY_POLL_POLICY_FILE: ${TG_CANARY_POLL_POLICY_FILE:-}
      # --- Estate: declared/tunnel/learned topology files, per-source cascade-alert names, poll interval,
      # expected-capabilities reconcile. Cascade defaults preserved so an empty passthrough can't blank them. ---
      TG_ESTATE_DECLARED_FILE: ${TG_ESTATE_DECLARED_FILE:-}
      TG_ESTATE_TUNNEL_FILE: ${TG_ESTATE_TUNNEL_FILE:-}
      TG_ESTATE_LEARNED_FILE: ${TG_ESTATE_LEARNED_FILE:-}
      TG_NETBOX_CASCADE_ALERT: ${TG_NETBOX_CASCADE_ALERT:-HostDown}
      TG_LIBRENMS_CASCADE_ALERT: ${TG_LIBRENMS_CASCADE_ALERT:-DeviceDown}
      TG_PVE_CASCADE_ALERT: ${TG_PVE_CASCADE_ALERT:-HostDown}
      TG_LIBRENMS_ALERT_POLL_INTERVAL: ${TG_LIBRENMS_ALERT_POLL_INTERVAL:-}
      TG_EXPECTED_CAPABILITIES: ${TG_EXPECTED_CAPABILITIES:-}
      # --- Actuation (SSH). Inert while mutation is OFF (the interceptor refuses before executing). The
      # native in-process crypto/ssh runner verifies each target host key against KNOWN_HOSTS and authenticates
