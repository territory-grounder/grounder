      TG_LDAP_USER_BASE: ${TG_LDAP_USER_BASE:-}
      TG_LDAP_GROUP_BASE: ${TG_LDAP_GROUP_BASE:-}
      TG_LDAP_BIND_DN: ${TG_LDAP_BIND_DN:-env:LDAP_BIND_DN}
      TG_LDAP_BIND_PW: ${TG_LDAP_BIND_PW:-env:LDAP_BIND_PW}
      TG_LDAP_CA: ${TG_LDAP_CA:-}
      TG_LDAP_STARTTLS: ${TG_LDAP_STARTTLS:-}
