      TG_SEMAPHORE_ADDR: ${TG_SEMAPHORE_ADDR:-}
      TG_SEMAPHORE_SOURCE_ID: ${TG_SEMAPHORE_SOURCE_ID:-}
      TG_SEMAPHORE_TOKEN_REF: ${TG_SEMAPHORE_TOKEN_REF:-${SEMAPHORE_TOKEN:+env:SEMAPHORE_TOKEN}}
      TG_SEMAPHORE_CA: ${TG_SEMAPHORE_CA:-}
      TG_SEMAPHORE_PROJECT_ID: ${TG_SEMAPHORE_PROJECT_ID:-}
      TG_SEMAPHORE_REF_SCHEME: ${TG_SEMAPHORE_REF_SCHEME:-}
      TG_SEMAPHORE_REF_PREFIX: ${TG_SEMAPHORE_REF_PREFIX:-}
      TG_SEMAPHORE_REF_FIELD: ${TG_SEMAPHORE_REF_FIELD:-}
      SEMAPHORE_TOKEN: ${SEMAPHORE_TOKEN:-}
