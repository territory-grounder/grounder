      TG_SKILL_GEN_WINDOW: ${TG_SKILL_GEN_WINDOW:-}
      TG_SKILL_GEN_MAX_SKILLS: ${TG_SKILL_GEN_MAX_SKILLS:-}
      TG_SKILL_OFFLINE_MAX_ADMIT_PER_RUN: ${TG_SKILL_OFFLINE_MAX_ADMIT_PER_RUN:-}
      TG_SKILL_TRIAL_MIN_SAMPLES: ${TG_SKILL_TRIAL_MIN_SAMPLES:-}
