      TG_CREDENTIAL_NATIVE_RULES: ${TG_CREDENTIAL_NATIVE_RULES:-}
      TG_CREDENTIAL_SYNC_INTERVAL: ${TG_CREDENTIAL_SYNC_INTERVAL:-}
