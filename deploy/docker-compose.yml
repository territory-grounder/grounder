      TG_OPENBAO_WRAP_TOKEN_REF: ${TG_OPENBAO_WRAP_TOKEN_REF:-}
      TG_OPENBAO_JWT_REF: ${TG_OPENBAO_JWT_REF:-}
      TG_OPENBAO_JWT_ROLE: ${TG_OPENBAO_JWT_ROLE:-}
