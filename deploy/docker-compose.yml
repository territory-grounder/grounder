# Territory Grounder — single-node guided compose (Phase 0 read-only foundation).
#
# Provenance: [R] "one guided docker-compose" · [corrections] Temporal + LiteLLM bundled, no n8n/
# Cronicle/Claude-Code. Honest scope: this is a multi-service STACK (not one container), and
# Temporal is deliberately load-bearing (P0-7). Secrets are supplied by reference via the env file
# (see .env.example) — never inline (INV-13).
#
# Phase 0: mutation is disabled by construction; nothing here can mutate a managed estate.
name: territory-grounder

services:
  # --- application state: one Postgres, RLS baseline, two roles (migration/runtime) ---
  postgres:
    image: pgvector/pgvector:pg16@sha256:1d533553fefe4f12e5d80c7b80622ba0c382abb5758856f52983d8789179f0fb
    environment:
      POSTGRES_DB: grounder
      POSTGRES_USER: ${PG_SUPERUSER:-postgres}
      POSTGRES_PASSWORD: ${PG_SUPERUSER_PASSWORD:?set in .env}
      # consumed by postgres-init/00-roles.sh to create the two least-privilege roles
      TG_MIGRATION_PASSWORD: ${TG_MIGRATION_PASSWORD:?set in .env}
      TG_RUNTIME_PASSWORD: ${TG_RUNTIME_PASSWORD:?set in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_SUPERUSER:-postgres} -d grounder"]
      interval: 5s
      timeout: 3s
      retries: 20

  # --- litellm-secrets: one-shot secret delivery for the third-party model gateway (spec/024 REQ-2403) ---
  # Resolves LiteLLM's master key from OpenBao and writes it to a memory-backed env file the litellm entrypoint
  # sources — so LITELLM_MASTER_KEY never lives in plaintext .env. Reuses the already-signed/verified worker
  # image (tg-secretenv ships in every TG image), so it adds NO new image to sign/verify/deploy. Only THIS
  # init receives the OpenBao token — litellm never does (it gets just its own resolved key).
  #
  # The delivery drop is a HOST tmpfs bind-mount (/dev/shm, RAM-backed): a Docker `type=tmpfs` NAMED volume is
  # mounted PER-CONTAINER (each mount is a fresh empty tmpfs — NOT shared), so the init's write would be
  # invisible to litellm; a host tmpfs path is one inode both containers share while staying off disk. Runs as
  # root so the 0600 output is owner-readable by the root litellm process (which drops ALL caps and thus cannot
  # DAC-override a foreign-owned file). FAIL-CLOSED: a ref that does not resolve exits non-zero and writes
  # nothing, so litellm (depends_on: service_completed_successfully) never starts blind.
  litellm-secrets:
    image: ${TG_WORKER_IMAGE:-registry-github.com/territory-grounder/grounder/worker}:${TG_TAG:-latest}
    user: "0:0"
    # -skip-empty: the provider-key pairs default to an EMPTY ref (`${TG_X_KEY_REF:-}`), so an install delivers
    # ONLY the providers it has configured in the vault (set TG_KIMI_KEY_REF=bao:… to enable a provider) — the
    # unset ones are skipped, not failed. The master key always resolves via its bao: default UNLESS an operator
    # explicitly sets TG_LITELLM_KEY_REF= to empty (a misconfig — then the init writes no master key and litellm
    # fails to boot, i.e. it still fails closed, just later); don't do that.
    entrypoint: ["/usr/local/bin/tg-secretenv", "-shell", "-skip-empty", "-out", "/run/litellm-secrets/env"]
    command:
      - LITELLM_MASTER_KEY=${TG_LITELLM_KEY_REF:-bao:secret/data/tg/litellm#master_key}
      - KIMI_API_KEY=${TG_KIMI_KEY_REF:-}
      - ZAI_API_KEY=${TG_ZAI_KEY_REF:-}
      - DEEPSEEK_API_KEY=${TG_DEEPSEEK_KEY_REF:-}
      - MISTRAL_API_KEY=${TG_MISTRAL_KEY_REF:-}
      - ANTHROPIC_API_KEY=${TG_ANTHROPIC_KEY_REF:-}
      - OPENAI_API_KEY=${TG_OPENAI_KEY_REF:-}
      - XAI_API_KEY=${TG_XAI_KEY_REF:-}
    environment:
      TG_OPENBAO_ADDR: ${TG_OPENBAO_ADDR:-}
      TG_OPENBAO_TOKEN_REF: ${TG_OPENBAO_TOKEN_REF:-}
      TG_OPENBAO_CA: ${TG_OPENBAO_CA:-}
    volumes:
      - ./secrets:/secrets:ro
      - ${TG_LITELLM_SECRET_DROP:-/dev/shm/tg-litellm-secrets}:/run/litellm-secrets
    restart: "no"

  # --- the model-gateway: one OpenAI-compatible endpoint fronting the provider fallback ladder ---
  litellm:
    image: ghcr.io/berriai/litellm:main-stable@sha256:a1745e629abfb17d434426ff48b115f54f4f4c4a0f5af241de569e93c63c411e
    # Container hardening (audit TG-153 gap #9): litellm holds every provider key, so constrain it — drop ALL
    # capabilities + forbid privilege escalation. It is a Python app that writes to its rootfs, so read-only
    # rootfs is intentionally NOT set here (would break it); the env→file secret-delivery refactor is tracked
    # separately under TG-153.
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    # The master key is delivered from OpenBao by the litellm-secrets init into a memory-backed (tmpfs) env
    # file that THIS entrypoint sources before exec-ing the image's original entrypoint — no plaintext
    # LITELLM_MASTER_KEY in .env (spec/024 REQ-2403). depends_on gates litellm on the init succeeding
    # (fail-closed: the key does not resolve ⇒ the init exits non-zero ⇒ litellm never starts). $$@ escapes to
    # $@ for the container so the config/port args pass through to prod_entrypoint.sh unchanged.
    depends_on:
      litellm-secrets:
        condition: service_completed_successfully
    entrypoint: ["/bin/sh", "-c", "set -a; . /run/litellm-secrets/env; set +a; exec /app/docker/prod_entrypoint.sh \"$$@\"", "litellm"]
    command: ["--config", "/etc/litellm/config.yaml", "--port", "4000"]
    environment:
      # Optional now — the litellm-secrets init sources the real value from OpenBao at start (which overrides
      # this empty default). Kept as a hook so a non-vault deployment can still set it directly in .env.
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-}
      # Provider keys are supplied by env reference and consumed by litellm-config.yaml.
      KIMI_API_KEY: ${KIMI_API_KEY:-}
      ZAI_API_KEY: ${ZAI_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      XAI_API_KEY: ${XAI_API_KEY:-}
    volumes:
      - ./litellm-config.yaml:/etc/litellm/config.yaml:ro
      - ${TG_LITELLM_SECRET_DROP:-/dev/shm/tg-litellm-secrets}:/run/litellm-secrets:ro
    ports:
      - "127.0.0.1:4000:4000"

  # --- durable orchestration: Temporal (replaces n8n + Cronicle) + its own Postgres ---
  temporal-postgres:
    image: postgres:16@sha256:33f923b05f64ca54ac4401c01126a6b92afe839a0aa0a52bc5aeb5cc958e5f20
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: ${TEMPORAL_PG_PASSWORD:?set in .env}
      POSTGRES_DB: temporal
    volumes:
      - temporaldata:/var/lib/postgresql/data

  temporal:
    image: temporalio/auto-setup:1.25.2@sha256:b1edc1e20002d958c8182f2ae08dee877a125083683a627a44917683419ba6a8
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: ${TEMPORAL_PG_PASSWORD:?set in .env}
      POSTGRES_SEEDS: temporal-postgres
    depends_on:
      - temporal-postgres
    ports:
      - "127.0.0.1:7233:7233"

  temporal-ui:
    image: temporalio/ui:2.34.0@sha256:cb17ea423d76a8a19a269d0bcd81fc12eee1f6365acd2a56b590dafb35696a95
    environment:
      TEMPORAL_ADDRESS: temporal:7233
    depends_on:
      - temporal
    ports:
      - "127.0.0.1:8233:8080"

  # --- the control-plane (read-only foundation) ---
  grounder:
    # In prod the host `docker compose pull`s this CI-built, registry-hosted image (GitOps); the tag is set
    # by the deploy (TG_TAG=<commit>). Locally `docker compose up --build` builds it from source instead.
    image: ${TG_GROUNDER_IMAGE:-registry-github.com/territory-grounder/grounder/grounder}:${TG_TAG:-latest}
    # Container hardening (audit TG-153 gap #9): the distroless grounder runs nonroot 65532 and mounts
    # /knowledge + /secrets read-only, so it holds no writable state on its rootfs — drop ALL capabilities,
    # forbid privilege escalation, read-only rootfs + tmpfs /tmp.
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    read_only: true
    tmpfs: ["/tmp"]
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        BIN: grounder
    environment:
      TG_RUNTIME_DSN: ${TG_RUNTIME_DSN:?set in .env}     # DML-only role
      TG_MIGRATION_DSN: ${TG_MIGRATION_DSN:?set in .env} # DDL role, startup only
      TG_LITELLM_URL: http://litellm:4000
      TG_LITELLM_KEY_REF: ${TG_LITELLM_KEY_REF:-env:LITELLM_MASTER_KEY}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      TG_PUBLIC_ADDR: ":8080"
      TG_ADMIN_ADDR: ":8443"
      # Browser operator session (spec/006 REQ-508) — read-only console login. Values live in .env,
      # referenced here indirectly (env: scheme); absent values just leave the browser path unregistered.
      TG_SESSION_KEY: ${TG_SESSION_KEY:-}
      # The binary reads the session-key REFERENCE (TG_SESSION_KEY_REF, default env:TG_SESSION_KEY) and
      # the browser-session TTL (TG_SESSION_TTL, default 12h). Without these passthroughs an operator
      # override in .env is silently dropped and the value stays at the in-code default.
      TG_SESSION_KEY_REF: ${TG_SESSION_KEY_REF:-env:TG_SESSION_KEY}
      TG_SESSION_TTL: ${TG_SESSION_TTL:-12h}
      TG_OPERATOR_NAME: ${TG_OPERATOR_NAME:-operator}
      TG_OPERATOR_TOKEN: ${TG_OPERATOR_TOKEN:-}
      TG_OPERATOR_TOKEN_REF: ${TG_OPERATOR_TOKEN_REF:-env:TG_OPERATOR_TOKEN}
      # Admin operator tier (task #27 Phase B, REQ-522) — the SEPARATE step-up credential for the
      # config/secret write lane. Absent = the admin routes are simply not registered (fail closed).
      TG_ADMIN_NAME: ${TG_ADMIN_NAME:-admin}
      TG_ADMIN_TOKEN: ${TG_ADMIN_TOKEN:-}
      TG_ADMIN_TOKEN_REF: ${TG_ADMIN_TOKEN_REF:-env:TG_ADMIN_TOKEN}
      TG_ADMIN_TTL: ${TG_ADMIN_TTL:-15m}
      # Secret-scheme policy (spec/024 REQ-2400): off (default) / warn / enforce. Under enforce the boot
      # preflight refuses to start on any non-exempt business secret that resolves through a plaintext-bearing
      # scheme (env:/file:/literal) instead of a backend (bao:/vault:/store:). Ship off, then warn, then enforce.
      TG_SECRET_POLICY: ${TG_SECRET_POLICY:-off}
      # LDAP / FreeIPA console login (spec/006 REQ-508 extension). A FOURTH way to authenticate a browser
      # operator session: a FreeIPA user logs in with their OWN directory username + password (the console
      # "Operator token" field carries the password), composed WITH the static break-glass operator above.
      # Gated ON only when TG_LDAP_AUTH_ENABLED=true AND at least one TG_LDAP_URLS replica is set. The
      # login binds AS THE USER (password never stored/hashed/logged); their group membership maps to a
      # role — TG_LDAP_AUTH_ADMIN_GROUP (default tg-admins) → admin-eligible step-up WITHOUT the static
      # admin credential, TG_LDAP_AUTH_OPERATOR_GROUP (default tg-operators) → read-only operator, neither
      # → DENY. TG_LDAP_URLS/TG_LDAP_CA/TG_LDAP_STARTTLS are the SAME transport knobs the worker's
      # credsource/ldap connector uses (LDAPS:636, CA-verified, never InsecureSkipVerify).
      TG_LDAP_AUTH_ENABLED: ${TG_LDAP_AUTH_ENABLED:-}
      TG_LDAP_URLS: ${TG_LDAP_URLS:-}
      TG_LDAP_CA: ${TG_LDAP_CA:-}
      TG_LDAP_STARTTLS: ${TG_LDAP_STARTTLS:-}
      # Site user-DN template (one %s), supplied at deploy time — the estate DN suffix is NEVER baked into the
      # image (STONITH); unset ⇒ the binary's generic FreeIPA/389-DS default (which a real deployment overrides).
      TG_LDAP_AUTH_USER_DN_TEMPLATE: ${TG_LDAP_AUTH_USER_DN_TEMPLATE:-}
      TG_LDAP_AUTH_ADMIN_GROUP: ${TG_LDAP_AUTH_ADMIN_GROUP:-tg-admins}
      TG_LDAP_AUTH_OPERATOR_GROUP: ${TG_LDAP_AUTH_OPERATOR_GROUP:-tg-operators}
      # Freshness bound for the WORKER's published mutation posture: a runtime_posture row older than this
      # reads as posture-unknown on /v1/whoami + /v1/governance (never a false OFF). Go duration; default 90s
      # (3x the worker's 30s posture heartbeat).
      TG_POSTURE_STALE_AFTER: ${TG_POSTURE_STALE_AFTER:-90s}
      # Sealed secrets (task #27 Phase D, REQ-524) — envelope master key MATERIAL (≥32 bytes). Absent
      # = sealing writes and store: references fail closed; env:/file: refs are unaffected.
      TG_SEAL_KEY: ${TG_SEAL_KEY:-}
      TG_SEAL_KEY_REF: ${TG_SEAL_KEY_REF:-env:TG_SEAL_KEY}
      # External secret substrate (spec/022): when TG_OPENBAO_ADDR is set the control plane resolves its own
      # SecretRefs as bao: references from OpenBao (fail-closed). Empty = substrate OFF (env:/file: as before).
      TG_OPENBAO_ADDR: ${TG_OPENBAO_ADDR:-}
      TG_OPENBAO_TOKEN_REF: ${TG_OPENBAO_TOKEN_REF:-}
      TG_OPENBAO_CA: ${TG_OPENBAO_CA:-}
      # Sealed-secret master key via OpenBao Transit (spec/022 REQ-2201) — set TG_SEAL_TRANSIT_KEY to run the
      # DEK wrap/unwrap inside OpenBao so the worker holds no master key (else the in-process TG_SEAL_KEY_REF).
      TG_SEAL_TRANSIT_KEY: ${TG_SEAL_TRANSIT_KEY:-}
      TG_SEAL_TRANSIT_ADDR: ${TG_SEAL_TRANSIT_ADDR:-}
      TG_SEAL_TRANSIT_TOKEN_REF: ${TG_SEAL_TRANSIT_TOKEN_REF:-}
      TG_SEAL_TRANSIT_MOUNT: ${TG_SEAL_TRANSIT_MOUNT:-}
      # Alertmanager push-ingest bearer (sources row ingest_token_ref = env:TG_AM_INGEST_TOKEN). The value
      # lives in .env; without this passthrough the ref resolves empty and every AM webhook 401s fail-closed
      # — which is exactly what happened on the first compose recreate after the token was minted.
      TG_AM_INGEST_TOKEN: ${TG_AM_INGEST_TOKEN:-}
      # LibreNMS push-ingest bearer (AuthIngestPush, exactly like Alertmanager). When TG_LIBRENMS_DEPLOYMENTS
      # is declared AND this resolves non-empty, the grounder boot provisions the `librenms` sources row from
      # TG_LIBRENMS_INGEST_TOKEN_REF (default env:TG_LIBRENMS_INGEST_TOKEN) — config-not-code, no hand-run SQL.
      # This is the value the LibreNMS transports present as the bearer on POST /v1/ingest/librenms; the value
      # lives only in .env. Without this passthrough the ref resolves empty and push is not provisioned.
      TG_LIBRENMS_DEPLOYMENTS: ${TG_LIBRENMS_DEPLOYMENTS:-}
      TG_LIBRENMS_INGEST_TOKEN_REF: ${TG_LIBRENMS_INGEST_TOKEN_REF:-env:TG_LIBRENMS_INGEST_TOKEN}
      TG_LIBRENMS_INGEST_TOKEN: ${TG_LIBRENMS_INGEST_TOKEN:-}
      # the grounder dials Temporal (as a client) to mint the ingest→triage session; the binary reads
      # TG_TEMPORAL_HOSTPORT (an unread TEMPORAL_ADDRESS silently degraded ingest to validate-only).
      TG_TEMPORAL_HOSTPORT: temporal:7233
      # The distilled-lessons corpus the WORKER maintains and this grounder serves as the wiki (#24,
      # cmd/grounder/wiki_read.go). The worker WRITES the untracked maintained corpus (deploy-persistent);
      # the tracked seed is read-only bootstrap unioned under it (see the worker service notes below).
      TG_KNOWLEDGE_FILE: ${TG_KNOWLEDGE_FILE:-/knowledge/corpus.maintained.json}
      TG_KNOWLEDGE_SEED_FILE: ${TG_KNOWLEDGE_SEED_FILE:-/knowledge/corpus.seed.json}
      # The actuation SSH key REFERENCE (canonically file:/secrets/one_key), passed to the grounder ONLY so
      # the deploy-time credential gate `grounder --check` (TG-113) can prove the same ./secrets mount the
      # worker uses is readable + parseable BY THE DISTROLESS RUNTIME USER (uid:gid 65532) before the worker
      # goes live — catching a re-provision that dropped the key (the silent-kill that killed ALL native SSH
      # while the worker still booted healthy). Run it on the box as the deploy gate, WITH this mount:
      #   docker compose run --rm grounder --check   # exits non-zero if /secrets/one_key is missing/unreadable
      # The grounder itself does not actuate; this ref is inert in its normal run path. See deploy/secrets/README.md.
      TG_ACTUATION_SSH_KEY: ${TG_ACTUATION_SSH_KEY:-}
    # The shared knowledge corpus: deploy/knowledge/ on the box (gitignored — only its .gitignore is
    # committed) mounts read-only here; the worker mounts it read-write (it maintains the corpus).
    # Absent/empty dir ⇒ the wiki and precedent retrieval are honestly empty, never an error.
    # Read-only secret material the grounder resolves via file: refs — the LDAP/FreeIPA console-login CA
    # (TG_LDAP_CA=file:/secrets/freeipa-ca.crt). deploy/secrets/ on the box (gitignored) mounts at /secrets
    # read-only; without this the CA is unreadable and every LDAP login fails closed instantly (no dial).
    volumes:
      - ./knowledge:/knowledge:ro
      - ./secrets:/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy
      litellm:
        condition: service_started
      temporal:
        condition: service_started
      # The distroless grounder ALSO runs as uid:gid 65532 and reads ./secrets read-only (the LDAP CA, and
      # the actuation key when `grounder --check` runs the TG-113 credential gate). Wait for the one-shot
      # perms fixer so a root-owned 750/600 ./secrets does not permission-deny the nonroot grounder.
      secrets-perms:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:8081:8080" # public API (authenticated) — on 8081 so the console owns 8080; front with mTLS/ingress in prod

  # --- one-shot perms init: the distroless worker/grounder run as uid:gid 65532, but ./secrets AND ./knowledge
  # are provisioned root-owned. For ./secrets (READ-ONLY to the runtime): a non-root process cannot even
  # TRAVERSE a 750 root:root dir, so WITHOUT this every native SSH read (hostdiag / syslog-ng / actuation) fails
  # 'permission denied' — surfacing as "known_hosts …unusable", which silently looked like a host-key problem
  # for a long time. For ./knowledge (WRITTEN by the worker — it maintains the distilled-lessons corpus): a
  # root-owned dir permission-denies the corpus WRITEBACK, which SILENTLY breaks the flywheel's de-novel
  # learning loop (the worker logs "cannot write corpus temp … permission denied" best-effort and continues,
  # so nothing crashes — it just never learns). Idempotent: make ./secrets group-readable (750/640, private key
  # NON-world-readable) and ./knowledge group-WRITABLE (775/664) by the worker's gid 65532. Runs as root with
  # READ-WRITE mounts (the only service needing rw); the worker + grounder depend on it completing first.
  secrets-perms:
    image: busybox:stable
    user: "0:0"
    volumes:
      - ./secrets:/secrets
      - ./knowledge:/knowledge
    command: ["sh","-c","chgrp -R 65532 /secrets 2>/dev/null || true; chmod 750 /secrets; find /secrets -type f -exec chmod 640 {} + ; chgrp -R 65532 /knowledge 2>/dev/null || true; chmod 775 /knowledge; find /knowledge -type f -exec chmod 664 {} + ; echo perms applied for uid:gid 65532 - secrets ro, knowledge rw"]
    restart: "no"

  # --- the Temporal Runner worker (read-only): drives each incident through triage → gated proposal and
  # stops at propose. WITHOUT this the stack serves the API but never triages anything. Mutation stays OFF
  # by construction (the worker refuses to boot if mutation is enabled). It reuses the same image build
  # (BIN=worker) and the same .env; the rich TG_* config knobs (suppression/estate/notifier/…) are optional
  # and degrade gracefully when unset.
  worker:
    image: ${TG_WORKER_IMAGE:-registry-github.com/territory-grounder/grounder/worker}:${TG_TAG:-latest}
    # Container hardening — ports the helm chart's worker securityContext to compose (audit TG-153 gap #9;
    # the helm chart at deploy/helm/.../worker-deployment.yaml already proves the worker runs read-only).
    # Drop ALL Linux capabilities (the distroless worker runs nonroot 65532 and needs none), forbid privilege
    # escalation (blocks the in-container→node escalation the HF actor used), and make the rootfs read-only —
    # the only writable state is the /knowledge bind-mount (novelty writeback) plus a tmpfs /tmp. Default
    # docker seccomp stays applied.
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    read_only: true
    tmpfs: ["/tmp"]
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        BIN: worker
    environment:
      TG_RUNTIME_DSN: ${TG_RUNTIME_DSN:?set in .env}
      # Durable stores + estate snapshot publication (REQ-516): default the worker's DB to the runtime
      # (DML-only) DSN so it persists predictions/ledger and PUBLISHES its estate graph for /v1/estate.
      # Empty TG_DB_DSN previously left the worker in-memory-only. Mutation stays OFF regardless.
      TG_DB_DSN: ${TG_DB_DSN:-${TG_RUNTIME_DSN}}
      TG_LITELLM_URL: http://litellm:4000
      TG_LITELLM_KEY_REF: ${TG_LITELLM_KEY_REF:-env:LITELLM_MASTER_KEY}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      TG_TEMPORAL_HOSTPORT: temporal:7233
      # Secret-scheme policy (spec/024 REQ-2400): off (default) / warn / enforce — the worker half of the boot
      # gate. Under enforce the worker refuses to start on a non-exempt plaintext (env:/file:/literal) business
      # secret. Mirrors the grounder gate; flip both off→warn→enforce once the business secrets are on a backend.
      TG_SECRET_POLICY: ${TG_SECRET_POLICY:-off}
      # --- Worker admin surface (Phase-2 canary safety plane): the runtime kill-switch (POST /halt →
      # gate.Disable) + read-only /metrics, on an internal port (:8444). The halt bearer reuses the admin
      # token (TG_ADMIN_TOKEN_REF → env:TG_ADMIN_TOKEN); absent ⇒ /halt is NOT registered (fail closed) and
      # only /metrics is served. There is NO enable path here — /halt can only turn mutation more off.
      TG_WORKER_ADMIN_ADDR: ":8444"
      TG_ADMIN_TOKEN_REF: ${TG_ADMIN_TOKEN_REF:-env:TG_ADMIN_TOKEN}
      TG_ADMIN_TOKEN: ${TG_ADMIN_TOKEN:-}
      # Mutation breaker trip threshold (first canary = 1: a single deviation/chain-gap halts). Inert while
      # mutation is OFF — the interceptor refuses before it ever executes, so nothing trips it today.
      TG_MUTATION_BREAKER_THRESHOLD: ${TG_MUTATION_BREAKER_THRESHOLD:-1}
      # --- Cost/budget spend guard + $-ceiling breaker (the INDEPENDENT sibling of the mutation breaker). ---
      # Accrues approximate USD per model completion (approx tokens x a per-model rate) into durable, cross-
      # process day(UTC)+session accumulators (0023); a trip force-Shadows every sibling worker + records a
      # 'cost:breaker-trip' ledger note. ALL DEFAULT 0 = DISABLED: an unset budget/rate never enforces (the
      # spend-guard fail-OPEN posture — a budget that is not configured must never block work). Set them in
      # .env to arm it. FAIL-OPEN by design: a cost-store outage degrades to no-enforcement, never a halt.
      # Per-model rates: add one TG_COST_RATE_<model>_PER_1K per gateway tier the agent calls (fast/primary).
      TG_COST_DAILY_BUDGET_USD: ${TG_COST_DAILY_BUDGET_USD:-0}
      TG_COST_SESSION_CEILING_USD: ${TG_COST_SESSION_CEILING_USD:-0}
      TG_COST_DEFAULT_RATE_PER_1K: ${TG_COST_DEFAULT_RATE_PER_1K:-0}
      TG_COST_PER_ACTUATION_USD: ${TG_COST_PER_ACTUATION_USD:-0}
      TG_COST_RATE_fast_PER_1K: ${TG_COST_RATE_fast_PER_1K:-0}
      TG_COST_RATE_primary_PER_1K: ${TG_COST_RATE_primary_PER_1K:-0}
      # --- Estate topology sources (build the causal graph the gate reasons over + the Estate view). ---
      # Absent ⇒ an empty graph (honest); supply the real values in .env to light it up. Tokens are
      # secret REFERENCES (env:NAME); the referenced secret is passed alongside, never a literal in-repo.
      TG_NETBOX_URL: ${TG_NETBOX_URL:-}
      TG_NETBOX_TOKEN_REF: ${TG_NETBOX_TOKEN_REF:-env:NETBOX_TOKEN}
      NETBOX_TOKEN: ${NETBOX_TOKEN:-}
      TG_PVE_URL: ${TG_PVE_URL:-}
      TG_PVE_TOKEN_REF: ${TG_PVE_TOKEN_REF:-env:PVE_TOKEN}
      PVE_TOKEN: ${PVE_TOKEN:-}
      # The actor-attribution PVE task-log reader (spec/023): a SEPARATE least-privilege READ-ONLY token —
      # never the tg-actuate write token. Unset OR resolving-empty ⇒ the reader is not registered (the
      # worker gates on the RESOLVED token, so an empty PVE_RO_TOKEN does not arm a reader that would 401).
      TG_PVE_RO_TOKEN_REF: ${TG_PVE_RO_TOKEN_REF:-}
      PVE_RO_TOKEN: ${PVE_RO_TOKEN:-}
