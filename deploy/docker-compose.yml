      # principals — non-self actors read suspicious until you declare your admins, the safe direction).
      TG_ATTRIBUTION_CONFIG: ${TG_ATTRIBUTION_CONFIG:-}
      TG_LIBRENMS_DEPLOYMENTS: ${TG_LIBRENMS_DEPLOYMENTS:-}
      LIBRENMS_TOKEN: ${LIBRENMS_TOKEN:-}
      # Per-site LibreNMS API tokens: the deployment rows reference these by name (env:LIBRENMS_NL_TOKEN /
