      TG_AWX_TOKEN_REF: ${TG_AWX_TOKEN_REF:-env:AWX_TOKEN}
      TG_AWX_CA: ${TG_AWX_CA:-}
      TG_AWX_INVENTORY_ID: ${TG_AWX_INVENTORY_ID:-}
      TG_AWX_REF_SCHEME: ${TG_AWX_REF_SCHEME:-}
