      TG_DISCOVERY_CORPUS_CAP: ${TG_DISCOVERY_CORPUS_CAP:-}
      TG_DISCOVERY_CORPUS_FILE: ${TG_DISCOVERY_CORPUS_FILE:-eval/discovery-corpus.json}
      TG_DISCOVERY_FLUSH_INTERVAL: ${TG_DISCOVERY_FLUSH_INTERVAL:-}
