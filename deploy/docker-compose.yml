      TG_SKILL_OFFLINE_REGRESSION_SLACK: ${TG_SKILL_OFFLINE_REGRESSION_SLACK:-}
      TG_SKILL_OFFLINE_MIN_INCIDENTS: ${TG_SKILL_OFFLINE_MIN_INCIDENTS:-}
